name = 'threadcast'
compatibility_date = "2026-02-12"
compatibility_flags = ["nodejs_als"]
main = ".svelte-kit/cloudflare/_worker.js"
workers_dev = true
preview_urls = true

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[[r2_buckets]]
binding = "THREADS_BUCKET"
bucket_name = "threadcast-threads"

[[d1_databases]]
binding = "AUTH_DB"
database_name = "threadcast-auth"
database_id = "a451c8cc-8326-4f40-a414-9a83c2b6fba7"
migrations_dir = "drizzle"

[[ratelimits]]
name = "LOCAL_AUTH_EXCHANGE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[ratelimits]]
name = "LOCAL_AUTH_DEVICE_EXCHANGE_LIMITER"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

[observability]
enabled = true

[observability.traces]
enabled = true
