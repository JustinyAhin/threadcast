name = "threadcast-web"
compatibility_date = "2026-02-12"
compatibility_flags = ["nodejs_als"]
main = ".svelte-kit/cloudflare/_worker.js"
workers_dev = true
preview_urls = true

[vars]
PUBLIC_OG_URL = "https://og.threadcast.dev"

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[[r2_buckets]]
binding = "THREADS_BUCKET"
bucket_name = "threadcast-threads"

[[d1_databases]]
binding = "AUTH_DB"
database_name = "threadcast-auth"
database_id = "a451c8cc-8326-4f40-a414-9a83c2b6fba7"
migrations_dir = "drizzle"
