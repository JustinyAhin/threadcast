<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#0c0a09"/>
  <g transform="translate(64, 58)">
    <!-- Thread lines representing conversation threads -->
    <line x1="-28" y1="-26" x2="-28" y2="30" stroke="#3d3731" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="-18" x2="-12" y2="38" stroke="#3d3731" stroke-width="3" stroke-linecap="round"/>
    <line x1="4" y1="-26" x2="4" y2="30" stroke="#3d3731" stroke-width="3" stroke-linecap="round"/>
    <!-- Accent nodes on threads -->
    <circle cx="-28" cy="-16" r="6" fill="#f59e0b"/>
    <circle cx="-12" cy="-4" r="6" fill="#f59e0b"/>
    <circle cx="4" cy="-16" r="6" fill="#f59e0b"/>
    <!-- Broadcast/cast wave arcs -->
    <path d="M 18 -8 Q 28 -2 18 8" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <path d="M 24 -16 Q 40 -2 24 16" fill="none" stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
