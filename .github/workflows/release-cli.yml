name: Release CLI

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Release version (e.g. 0.1.0)"
                required: true

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: macos-latest
                      arch: arm64
                      name: darwin-arm64
                    - os: macos-13
                      arch: x64
                      name: darwin-x64
                    - os: ubuntu-latest
                      arch: x64
                      name: linux-x64
                    - os: ubuntu-24.04-arm
                      arch: arm64
                      name: linux-arm64
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - run: bun install
            - run: bun run --filter @threadcast/cli build
            - uses: actions/upload-artifact@v4
              with:
                  name: threadcast-${{ matrix.name }}
                  path: packages/cli/dist/threadcast-*

    release:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true
            - run: ls -lh artifacts/
            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: cli-v${{ inputs.version }}
                  name: CLI v${{ inputs.version }}
                  files: artifacts/threadcast-*
