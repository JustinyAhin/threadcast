name: Release CLI

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Release version (e.g. 0.1.0)"
                required: true

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: macos-latest
                      arch: arm64
                      name: darwin-arm64
                    - os: macos-latest
                      arch: x64
                      name: darwin-x64
                    - os: ubuntu-latest
                      arch: x64
                      name: linux-x64
                    - os: ubuntu-24.04-arm
                      arch: arm64
                      name: linux-arm64
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - run: bun install
            - name: Install platform-specific @opentui/core binary
              run: |
                PKG="@opentui/core-${{ matrix.name }}"
                TARBALL=$(npm view "$PKG" dist.tarball)
                mkdir -p node_modules/$PKG
                curl -sL "$TARBALL" | tar xz -C node_modules/$PKG --strip-components=1
            - run: bun run --filter @threadcast/cli build
              env:
                  TARGET_ARCH: ${{ matrix.arch }}
            - uses: actions/upload-artifact@v4
              with:
                  name: threadcast-${{ matrix.name }}
                  path: packages/cli/dist/threadcast-*

    release:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true
            - name: Create tar.gz archives
              run: |
                  cd artifacts
                  for binary in threadcast-*; do
                    chmod +x "$binary"
                    cp "$binary" threadcast
                    tar czf "${binary}.tar.gz" threadcast
                    rm threadcast
                  done
                  ls -lh
            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: cli-v${{ inputs.version }}
                  name: CLI v${{ inputs.version }}
                  files: |
                      artifacts/threadcast-*
            - name: Upload to R2
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
                  AWS_DEFAULT_REGION: auto
              run: |
                  for tarball in artifacts/threadcast-*.tar.gz; do
                    aws s3 cp "$tarball" \
                      "s3://threadcast-releases/cli/v${{ inputs.version }}/$(basename "$tarball")" \
                      --endpoint-url "${{ secrets.R2_ENDPOINT }}"
                  done

    update-homebrew:
        needs: release
        runs-on: ubuntu-latest
        steps:
            - name: Compute sha256 checksums
              id: checksums
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
                  AWS_DEFAULT_REGION: auto
              run: |
                  mkdir tarballs && cd tarballs
                  for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
                    aws s3 cp \
                      "s3://threadcast-releases/cli/v${{ inputs.version }}/threadcast-${platform}.tar.gz" . \
                      --endpoint-url "${{ secrets.R2_ENDPOINT }}"
                  done
                  echo "darwin_arm64=$(sha256sum threadcast-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
                  echo "darwin_x64=$(sha256sum threadcast-darwin-x64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
                  echo "linux_arm64=$(sha256sum threadcast-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
                  echo "linux_x64=$(sha256sum threadcast-linux-x64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

            - name: Update Homebrew formula
              env:
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
                  VERSION: ${{ inputs.version }}
                  R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
                  SHA_DARWIN_ARM64: ${{ steps.checksums.outputs.darwin_arm64 }}
                  SHA_DARWIN_X64: ${{ steps.checksums.outputs.darwin_x64 }}
                  SHA_LINUX_ARM64: ${{ steps.checksums.outputs.linux_arm64 }}
                  SHA_LINUX_X64: ${{ steps.checksums.outputs.linux_x64 }}
              run: |
                  git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/JustinyAhin/homebrew-threadcast.git" tap
                  cd tap

                  REPO_URL="${R2_PUBLIC_URL}/cli/v${VERSION}"

                  cat > Formula/threadcast.rb << EOF
                  class Threadcast < Formula
                    desc "CLI tool for Threadcast"
                    homepage "https://github.com/JustinyAhin/threadcast"
                    version "${VERSION}"
                    license "MIT"

                    on_macos do
                      on_arm do
                        url "${REPO_URL}/threadcast-darwin-arm64.tar.gz"
                        sha256 "${SHA_DARWIN_ARM64}"
                      end

                      on_intel do
                        url "${REPO_URL}/threadcast-darwin-x64.tar.gz"
                        sha256 "${SHA_DARWIN_X64}"
                      end
                    end

                    on_linux do
                      on_arm do
                        url "${REPO_URL}/threadcast-linux-arm64.tar.gz"
                        sha256 "${SHA_LINUX_ARM64}"
                      end

                      on_intel do
                        url "${REPO_URL}/threadcast-linux-x64.tar.gz"
                        sha256 "${SHA_LINUX_X64}"
                      end
                    end

                    def install
                      bin.install "threadcast"
                    end

                    test do
                      assert_match version.to_s, shell_output("#{bin}/threadcast --version")
                    end
                  end
                  EOF

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add Formula/threadcast.rb
                  git commit -m "Update threadcast to ${VERSION}"
                  git push
